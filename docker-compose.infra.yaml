services:
  db:
    image: postgres:16
    container_name: gupang-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    networks:
      - gupang-network

networks:
  gupang-network:
    name: gupang-network
    driver: bridge